name: Build and Push Docker Image
on:
  push:
    branches:
      - main
      - develop

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push (for both branches)
        uses: docker/build-push-action@v5
        with:
          context: ./lab2/
          file: ./lab2/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/antipina:latest

      - name: Deploy to Production (only for main)
        if: github.ref_name == 'main'
        run: echo "Deploying to production server..."

      - name: Deploy to Development (only for develop)
        if: github.ref_name == 'develop'
        run: echo "Deploying to development server..."
